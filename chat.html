<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مساعد نظام الطيبات الذكي</title>
    <style>
        :root {
            --primary-color: #000000;
            --bg-color: #ffffff;
            --chat-bg: #f9f9f9;
            --text-dark: #1a1a1a;
            --text-light: #ffffff;
            --bot-msg-bg: #f1f1f1;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            /* استخدام dvh لضمان الطول الصحيح على جميع المتصفحات */
            height: 100vh;
            height: 100dvh; 
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
        }

        .chat-header {
            background: var(--primary-color);
            color: var(--text-light);
            padding: 12px;
            text-align: center;
            font-size: 1rem;
            font-weight: 600;
            flex-shrink: 0;
        }

        #chat-window {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--chat-bg);
            /* تحسين السكرول على الموبايل */
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 15px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--bot-msg-bg);
            color: var(--text-dark);
            border-bottom-right-radius: 2px;
        }

        .user-msg {
            align-self: flex-end;
            background: var(--primary-color);
            color: var(--text-light);
            border-bottom-left-radius: 2px;
        }

        .response-title {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 3px;
        }

        /* شبكة الأزرار المحسنة للموبايل */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* زرين في كل صف دائماً */
            gap: 8px;
            padding: 10px;
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0; /* منع الضغط عند ظهور الكيبورد */
        }

        button {
            padding: 10px 5px;
            border: 1.5px solid var(--primary-color);
            background: var(--bg-color);
            color: var(--primary-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
            white-space: nowrap; /* منع انقسام النص داخل الزر */
        }

        button:active {
            background: var(--primary-color);
            color: var(--text-light);
        }

        /* للهواتف الصغيرة جداً (مثل iPhone SE) */
        @media (max-width: 360px) {
            .message { font-size: 0.85rem; }
            button { font-size: 0.75rem; padding: 8px 4px; }
            .chat-header { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        مساعد نظام الطيبات (د. ضياء العوضي)
    </div>
    
    <div id="chat-window"></div>

    <div class="options-grid">
        <button onclick="getResponse('allowed')">المسموحات ✅</button>
        <button onclick="getResponse('forbidden')">الممنوعات ❌</button>
        <button onclick="getResponse('recipes')">وصفات 🍽️</button>
        <button onclick="getResponse('bio')">عن الدكتور 👨‍⚕️</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');

    const data = {
        allowed: {
            title: "المسموحات (الطيبات):",
            content: "• <b>نشويات:</b> أرز، بطاطس، توست أبيض محمص.<br>• <b>بروتين:</b> لحم ضأن، أرانب، سمك فيليه، حمام.<br>• <b>دهون:</b> زيت زيتون، سمن بلدي.<br>• <b>فاكهة:</b> تمر، تين، عنب، جوافة، رمان، موز.<br>• <b>أخرى:</b> عسل، مربى، نوتيلا، جبن شيدر."
        },
        forbidden: {
            title: "الممنوعات (الخبائث):",
            content: "• <b>ممنوع:</b> الدقيق الأسمر، المكرونة، البقوليات (فول/عدس).<br>• <b>ممنوع:</b> الدجاج، البيض، الجمبري.<br>• <b>ممنوع:</b> الحليب والزبادي والقريش.<br>• <b>ممنوع:</b> الخضار النيء والورقيات.<br>• <b>ممنوع:</b> المشروبات الغازية والشاي الأحمر."
        },
        recipes: {
            title: "مقترح وجبات اليوم:",
            content: "<b>فطور:</b> توست محمص + سمن وعسل.<br><b>غداء:</b> أرز بسمتي + صينية بطاطس باللحم.<br><b>عشاء:</b> بطاطس مهروسة بزيت الزيتون أو فواكه مسموحة."
        },
        bio: {
            title: "د. ضياء العوضي:",
            content: "أستاذ بكلية الطب جامعة عين شمس، مؤسس نظام الطيبات لتقليل الالتهابات ورفع المناعة عبر تجنب مهيجات الأمعاء."
        }
    };

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}-msg`;
        div.innerHTML = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function getResponse(type) {
        // نستخدم النص من البيانات بدلاً من نص الزر لضمان الثبات
        const labels = {allowed: 'المسموحات ✅', forbidden: 'الممنوعات ❌', recipes: 'وصفات 🍽️', bio: 'عن الدكتور 👨‍⚕️'};
        addMessage(labels[type], 'user');

        setTimeout(() => {
            const responseHTML = `<span class="response-title">${data[type].title}</span>${data[type].content}`;
            addMessage(responseHTML, 'bot');
        }, 400);
    }

    window.onload = () => {
        setTimeout(() => {
            addMessage("مرحباً بك! أنا مساعدك في نظام الطيبات. اختر قسماً من الأسفل لمعرفة المزيد:", 'bot');
        }, 500);
    };
</script>

</body>
</html>
