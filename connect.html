<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تواصل معنا | نظام الطيبات</title>

<style>

  body {

    margin: 0;

    font-family: Arial, sans-serif;

    background: #f5f1e6;

    color: #111;

  }

  /* زر الرئيسية */

  .home-btn {

    position: fixed;

    top: 10px;

    left: 10px;

    background: #fff;

    color: #111;

    border: 1px solid #ddd;

    padding: 6px 10px;

    font-size: 12px;

    border-radius: 8px;

    text-decoration: none;

    z-index: 1000;

  }

  h1 {

    text-align: center;

    margin-top: 80px;

    font-size: 24px;

    color: #111;

  }

  p {

    text-align: center;

    color: #444;

    margin-bottom: 20px;

    font-size: 14px;

    padding: 0 10px;

  }

  .container {

    display: flex;

    flex-direction: column;

    align-items: center;

    gap: 12px;

    padding: 0 15px 40px;

  }

  /* الأزرار */

  .btn {

    width: 100%;

    max-width: 320px;

    display: flex;

    align-items: center;

    gap: 10px;

    padding: 12px 14px;

    border-radius: 12px;

    text-decoration: none;

    font-size: 15px;

    color: #111;

    background: #fff;

    border: 1px solid #e6e6e6;

    transition: 0.2s;

    box-sizing: border-box;

  }

  .btn:active {

    transform: scale(0.98);

  }

  .btn:hover {

    box-shadow: 0 5px 14px rgba(0,0,0,0.08);

  }

  /* الأيقونات */

  .icon {

    width: 22px;

    height: 22px;

  }

  /* تحسين للموبايل الصغير */

  @media (max-width: 400px) {

    h1 {

      font-size: 22px;

    }

    .btn {

      font-size: 14px;

      padding: 11px 12px;

    }

  }

</style>

</head>

<body>

<a href="/" class="home-btn">الرئيسية</a>

<h1>تواصل معنا</h1>

<p>يسعدنا تواصلك معنا عبر منصاتنا الرسمية</p>

<div class="container">

  <a class="btn" href="https://www.facebook.com/share/1CZohYsK1g/?mibextid=wwXIfr" target="_blank">

    <img class="icon" src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/facebook.svg">

    فيسبوك

  </a>

  <a class="btn" href="https://t.me/diaa_alawady_videos" target="_blank">

    <img class="icon" src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/telegram.svg">

    تيليجرام

  </a>

  <a class="btn" href="https://youtube.com/@taybatfood?si=vQw2dpO5unLzb-Np" target="_blank">

    <img class="icon" src="https://cdn.jsdelivr.net/npm/simple-icons@v11/icons/youtube.svg">

    يوتيوب

  </a>

</div>

</body>

</html>
