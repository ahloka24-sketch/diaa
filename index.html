    <style>

        :root {

            --primary: #6e1414;

            --primary-light: #a61e1e;

            --accent: #d4a017;

            --accent-light: #f6d365;

            --bg-cream: #fff8f6;

            --white: #ffffff;

            --danger: #1f5f4a;

            --text-main: #2f1f1f;

            --shadow: 0 12px 35px rgba(110, 20, 20, 0.12);

            --radius-lg: 26px;

            --radius-md: 18px;

        }

        * {

            box-sizing: border-box;

            margin: 0;

            padding: 0;

            -webkit-tap-highlight-color: transparent;

        }

        body {

            font-family: 'Tajawal', sans-serif;

            background:

                radial-gradient(circle at top left, rgba(166,30,30,0.05), transparent 30%),

                radial-gradient(circle at top right, rgba(212,160,23,0.06), transparent 35%),

                var(--bg-cream);

            color: var(--text-main);

            overflow-x: hidden;

            scroll-behavior: smooth;

        }

        .sidebar-overlay {

            position: fixed;

            inset: 0;

            background: rgba(0,0,0,0.45);

            z-index: 2000;

            display: none;

            backdrop-filter: blur(4px);

        }

        .sidebar {

            position: fixed;

            right: -280px;

            top: 0;

            width: 280px;

            height: 100%;

            background: var(--white);

            z-index: 2001;

            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

            padding: 30px 20px;

            border-radius: 30px 0 0 30px;

            box-shadow: var(--shadow);

            border-left: 4px solid rgba(166,30,30,0.08);

        }

        .sidebar.active { right: 0; }

        .sidebar-header {

            margin-bottom: 30px;

            text-align: center;

        }

        .side-link {

            display: flex;

            align-items: center;

            gap: 15px;

            padding: 15px;

            text-decoration: none;

            color: var(--primary);

            font-weight: 700;

            border-radius: var(--radius-md);

            transition: 0.3s;

            margin-bottom: 5px;

            cursor: pointer;

        }

        .side-link:hover {

            background: #fff4f4;

            color: var(--primary-light);

        }

        header {

            background:

                linear-gradient(135deg, rgba(110,20,20,0.96), rgba(166,30,30,0.92)),

                url('https://images.unsplash.com/photo-1607623814075-e51df1bdc82f?q=80&w=1200&auto=format&fit=crop') center/cover;

            background-blend-mode: overlay;

            padding: 50px 20px 25px;

            border-radius: 0 0 40px 40px;

            color: white;

            position: relative;

            box-shadow: var(--shadow);

        }

        .nav-top {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 20px;

        }

        .logo-box {

            display: flex;

            align-items: center;

            gap: 12px;

        }

        .logo-icon {

            width: 52px;

            height: 52px;

            background: linear-gradient(135deg, var(--accent), var(--accent-light));

            border-radius: 16px;

            display: flex;

            align-items: center;

            justify-content: center;

            font-family: 'Amiri';

            font-size: 20px;

            color: var(--primary);

            font-weight: bold;

            box-shadow: 0 8px 18px rgba(0,0,0,0.12);

        }

        .page {

            display: none;

            padding-bottom: 100px;

        }

        .page.active {

            display: block;

            animation: fadeIn 0.5s ease;

        }

        @keyframes fadeIn {

            from { opacity: 0; transform: translateY(10px); }

            to { opacity: 1; transform: translateY(0); }

        }

        .store-btns {

            display: flex;

            gap: 10px;

            padding: 0 20px;

            margin-bottom: 20px;

        }

        .store-btn {

            flex: 1;

            background: var(--white);

            border: 2px solid var(--primary);

            color: var(--primary);

            padding: 12px;

            border-radius: 14px;

            font-weight: 800;

            cursor: pointer;

            transition: 0.3s;

            text-align: center;

        }

        .store-btn.active {

            background: var(--primary);

            color: white;

        }

        .content-area { padding: 0 20px; }

        .card-item {

            background: rgba(255,255,255,0.92);

            backdrop-filter: blur(8px);

            border-radius: var(--radius-md);

            padding: 18px;

            margin-bottom: 15px;

            display: flex;

            align-items: center;

            gap: 18px;

            box-shadow: var(--shadow);

            border-right: 5px solid var(--primary-light);

        }

        .card-item.forbidden { border-right-color: var(--danger); }

        .card-icon {

            width: 58px;

            height: 58px;

            background: linear-gradient(135deg, #fff3f3, #fffdf8);

            border-radius: 16px;

            display: flex;

            align-items: center;

            justify-content: center;

            font-size: 28px;

            flex-shrink: 0;

        }

        .card-info h3 {

            font-size: 15px;

            font-weight: 800;

            color: var(--primary);

            margin-bottom: 4px;

        }

        .card-info p {

            font-size: 11px;

            color: #666;

            line-height: 1.6;

        }

        .contact-info {

            margin-top: 5px;

            font-size: 10px;

            color: var(--accent);

            font-weight: bold;

        }

        .reminder-card {

            background: linear-gradient(135deg, var(--accent), #b8860b);

            padding: 16px 20px;

            border-radius: var(--radius-md);

            margin: 20px 20px 25px;

            color: white;

            display: flex;

            align-items: center;

            gap: 15px;

            box-shadow: 0 10px 22px rgba(212, 160, 23, 0.28);

        }

        .tab-bar {

            display: flex;

            overflow-x: auto;

            padding: 0 20px;

            gap: 10px;

            scrollbar-width: none;

            margin-bottom: 20px;

        }

        .tab {

            background: white;

            padding: 10px 22px;

            border-radius: 30px;

            font-weight: 700;

            font-size: 13px;

            color: var(--primary);

            white-space: nowrap;

            cursor: pointer;

            box-shadow: 0 4px 10px rgba(0,0,0,0.04);

        }

        .tab.active {

            background: var(--primary);

            color: white;

        }

        .bottom-nav {

            position: fixed;

            bottom: 20px;

            left: 20px;

            right: 20px;

            background: linear-gradient(135deg, var(--primary), var(--primary-light));

            border-radius: 25px;

            padding: 12px 5px;

            display: flex;

            justify-content: space-around;

            box-shadow: 0 15px 35px rgba(110,20,20,0.28);

            z-index: 1000;

        }

        .nav-btn {

            background: none;

            border: none;

            color: rgba(255,255,255,0.55);

            font-family: 'Tajawal';

            font-size: 10px;

            display: flex;

            flex-direction: column;

            align-items: center;

            gap: 4px;

            cursor: pointer;

        }

        .nav-btn.active { color: var(--accent-light); }

        .nav-btn svg { width: 22px; height: 22px; }

        .toast {

            position: fixed;

            top: 40px;

            left: 50%;

            transform: translateX(-50%);

            background: rgba(0,0,0,0.85);

            color: white;

            padding: 12px 30px;

            border-radius: 50px;

            font-size: 13px;

            z-index: 3000;

            display: none;

        }

    </style>

<script>

const days = ["السبت", "الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"];

let currentDay = "السبت";

const storeData = {

    restaurants: [

        { name: "ملحمة السلطان", icon: "🥩", address: "القاهرة - مدينة نصر", phone: "0123456789" },

        { name: "جزارة الريف البلدي", icon: "🍖", address: "الجيزة - الدقي", phone: "0100000000" },

        { name: "بيت اللحوم الممتازة", icon: "🥩", address: "الإسكندرية - سموحة", phone: "0112233445" }

    ],

    markets: [

        { name: "سوق البحّار", icon: "🐟", address: "الإسكندرية - بحري", phone: "19000" },

        { name: "دواجن المزرعة", icon: "🍗", address: "المعادي - شارع 9", phone: "0155555555" },

        { name: "مزرعة البيض الطازج", icon: "🥚", address: "وسط البلد", phone: "0128888888" }

    ]

};

const allowedData = [

    { icon: '🥩', t: 'اللحم البقري', d: 'ريش، إنتركوت، موزة، كبدة، مفروم، ستيك، برجر بلدي' },

    { icon: '🍖', t: 'اللحم الضاني', d: 'ريش ضاني، فخدة، رقبة، كبدة ضاني، ممبار، كرشة' },

    { icon: '🐄', t: 'أحشاء ومشتقات', d: 'كبدة، قلب، كلاوي، لسان، مخ، كوارع، عكاوي' },

    { icon: '🍗', t: 'الدجاج', d: 'صدور، أوراك، أجنحة، كبد وقوانص، دجاج بلدي، دجاج مشوي' },

    { icon: '🦃', t: 'الدواجن الأخرى', d: 'ديك رومي، بط، حمام، سمان، أرانب' },

    { icon: '🥚', t: 'البيض', d: 'بيض أبيض، بلدي، أحمر، سمان، مسلوق، أومليت، مقلي' }

];

const forbiddenData = [

    { icon: '🐟', t: 'الأسماك البيضاء', d: 'بلطي، بوري، دنيس، قاروص، موزة، لوت' },

    { icon: '🦐', t: 'المأكولات البحرية', d: 'جمبري، كاليماري، سبيط، كابوريا، جندوفلي' },

    { icon: '🐠', t: 'الأسماك الدهنية', d: 'سلمون، تونة، ماكريل، سردين، رنجة' },

    { icon: '🦈', t: 'الأسماك الكبيرة', d: 'هامور، وقار، شعور، مرجان، حريد' },

    { icon: '🐙', t: 'أصناف بحرية', d: 'أخطبوط، محار، بلح بحر، استاكوزا' },

    { icon: '🧂', t: 'طرق التقديم', d: 'مشوي، مقلي، سنجاري، فيليه، شوربة بحرية' }

];

const weeklyMenu = {

    "السبت": [

        { type: "فطور", t: "بيض بلدي مسلوق", d: "بيضتين مع رشة ملح وفلفل", i: "🥚" },

        { type: "غداء", t: "ستيك بقري", d: "قطعة ستيك مشوية متوسطة", i: "🥩" },

        { type: "عشاء", t: "تونة خفيفة", d: "تونة بالماء مع ليمون", i: "🐟" }

    ],

    "الأحد": [

        { type: "فطور", t: "أومليت جبّار", d: "3 بيضات مع أعشاب", i: "🍳" },

        { type: "غداء", t: "فراخ مشوية", d: "صدر دجاج متبل ومشوي", i: "🍗" },

        { type: "عشاء", t: "سردين", d: "سردين مشوي خفيف", i: "🐠" }

    ],

    "الاثنين": [

        { type: "فطور", t: "بيض سمان", d: "5 بيضات سمان", i: "🥚" },

        { type: "غداء", t: "كبدة بقري", d: "كبدة مشوحة سريعة", i: "🐄" },

        { type: "عشاء", t: "جمبري", d: "جمبري مشوي بالثوم", i: "🦐" }

    ],

    "الثلاثاء": [

        { type: "فطور", t: "بيض مقلي", d: "بيضتان في زبدة", i: "🍳" },

        { type: "غداء", t: "ريش ضاني", d: "ريش ضاني مشوية", i: "🍖" },

        { type: "عشاء", t: "تونة", d: "علبة تونة مصفاة", i: "🐟" }

    ],

    "الأربعاء": [

        { type: "فطور", t: "أومليت ديك رومي", d: "بيض مع شرائح ديك رومي", i: "🦃" },

        { type: "غداء", t: "سلمون", d: "شريحة سلمون مشوية", i: "🐠" },

        { type: "عشاء", t: "بيض مسلوق", d: "بيضتان خفيفتان", i: "🥚" }

    ],

    "الخميس": [

        { type: "فطور", t: "بيض بلدي", d: "بيضتان بلدي", i: "🥚" },

        { type: "غداء", t: "بط مشوي", d: "ربع بطة متبلة", i: "🦆" },

        { type: "عشاء", t: "كاليماري", d: "كاليماري مشوي", i: "🦑" }

    ],

    "الجمعة": [

        { type: "فطور", t: "بيض + كبدة", d: "فطور بروتين قوي", i: "🍳" },

        { type: "غداء", t: "مشكل لحوم", d: "بقري وضاني وكفتة", i: "🥩" },

        { type: "عشاء", t: "شوربة سي فود", d: "شوربة بحرية غنية", i: "🍲" }

    ]

};

function init() {

    renderTabs();

    renderDay("السبت");

    renderLists();

    renderStores('restaurants');

}

function renderTabs() {

    const h = document.getElementById('day-tabs');

    h.innerHTML = days.map(d => `<div class="tab ${d===currentDay?'active':''}" onclick="renderDay('${d}')">${d}</div>`).join('');

}

function renderDay(day) {

    currentDay = day;

    renderTabs();

    const list = document.getElementById('schedule-list');

    list.innerHTML = weeklyMenu[day].map(m => `

        <div class="card-item">

            <div class="card-icon">${m.i}</div>

            <div class="card-info">

                <span style="font-size:10px; color:var(--accent); font-weight:900;">${m.type}</span>

                <h3>${m.t}</h3>

                <p>${m.d}</p>

            </div>

        </div>

    `).join('');

    updateReminder(day);

}

function renderStores(category) {

    const list = document.getElementById('stores-list');

    const data = storeData[category];

    document.getElementById('btn-show-rest').classList.toggle('active', category === 'restaurants');

    document.getElementById('btn-show-market').classList.toggle('active', category === 'markets');

    list.innerHTML = data.map(s => `

        <div class="card-item">

            <div class="card-icon">${s.icon}</div>

            <div class="card-info">

                <h3>${s.name}</h3>

                <p>📍 ${s.address}</p>

                <div class="contact-info">📞 رقم التواصل: ${s.phone}</div>

            </div>

        </div>

    `).join('');

}

function updateReminder(day) {

    const box = document.getElementById('reminder-box');

    let txt = "نصيحة البروتين";

    let sub = day === "الجمعة"

        ? "نوّع بين اللحوم والأسماك والبيض لملف أميني متكامل."

        : "وزّع البروتين على 3 وجبات يوميًا لتحسين الشبع وبناء العضلات.";

    box.innerHTML = `<div class="reminder-card"><span>💡</span><div><b>${txt}</b><p>${sub}</p></div></div>`;

}

function renderLists() {

    document.getElementById('allowed-list').innerHTML = allowedData.map(i =>

        `<div class="card-item"><div class="card-icon">${i.icon}</div><div class="card-info"><h3>${i.t}</h3><p>${i.d}</p></div></div>`

    ).join('');

    document.getElementById('forbidden-list').innerHTML = forbiddenData.map(i =>

        `<div class="card-item forbidden"><div class="card-icon">${i.icon}</div><div class="card-info"><h3>${i.t}</h3><p>${i.d}</p></div></div>`

    ).join('');

}

function navTo(page) {

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

    document.getElementById('page-' + page).classList.add('active');

    if (document.getElementById('btn-' + page)) document.getElementById('btn-' + page).classList.add('active');

    window.scrollTo(0, 0);

}

function toggleMenu() {

    document.getElementById('sidebar').classList.toggle('active');

    document.getElementById('overlay').style.display =

        document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';

}

function showToast(msg) {

    const t = document.getElementById('toast');

    t.textContent = msg;

    t.style.display = 'block';

    setTimeout(() => t.style.display = 'none', 2000);

}

window.onload = init;

</script>

</body>
