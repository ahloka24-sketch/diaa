<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>نظام الطيبات | الإصدار النهائي</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>

:root {

    --primary: #1a3d2b;

    --primary-light: #2d6a4f;

    --accent: #c9a84c;

    --accent-light: #f0d080;

    --bg-cream: #f8f4e8;

    --white: #ffffff;

    --danger: #e74c3c;

    --text-main: #2c3e50;

    --shadow: 0 10px 30px rgba(26, 61, 43, 0.1);

    --radius-lg: 24px;

    --radius-md: 15px;

}

* {box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

body {

    font-family:'Tajawal',sans-serif;

    background:var(--bg-cream);

    color:var(--text-main);

    overflow-x:hidden;

}

/* Sidebar */

.sidebar-overlay {

    position:fixed;inset:0;

    background:rgba(0,0,0,0.5);

    display:none;

    z-index:2000;

}

.sidebar {

    position:fixed;

    right:-280px;

    top:0;

    width:280px;

    height:100%;

    background:#fff;

    transition:.4s;

    z-index:2001;

    padding:25px;

    border-radius:30px 0 0 30px;

}

.sidebar.active {right:0;}

.side-link{

    display:flex;

    gap:10px;

    padding:14px;

    border-radius:12px;

    cursor:pointer;

    font-weight:bold;

}

.side-link:hover{background:#f5f5f5;}

/* Header */

header{

    background:var(--primary);

    color:#fff;

    padding:40px 20px 20px;

    border-radius:0 0 40px 40px;

}

/* Pages */

.page{display:none;padding-bottom:100px;}

.page.active{display:block;}

/* Cards */

.card-item{

    background:#fff;

    margin:10px 20px;

    padding:15px;

    border-radius:15px;

    box-shadow:var(--shadow);

    display:flex;

    gap:15px;

}

.card-icon{

    font-size:25px;

}

.card-info h3{font-size:15px;color:var(--primary);}

.card-info p{font-size:12px;color:#666;}

.bottom-nav{

    position:fixed;

    bottom:15px;

    left:15px;

    right:15px;

    background:var(--primary);

    display:flex;

    justify-content:space-around;

    padding:10px;

    border-radius:25px;

    color:#fff;

}

.nav-btn{

    background:none;

    border:none;

    color:#fff;

    font-size:11px;

}

/* toast */

.toast{

    position:fixed;

    top:30px;

    left:50%;

    transform:translateX(-50%);

    background:#000;

    color:#fff;

    padding:10px 20px;

    border-radius:20px;

    display:none;

}

</style>

</head>

<body>

<div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">

    <h3>القائمة</h3>

    <div class="side-link" onclick="navTo('home');toggleMenu()">🏠 الرئيسية</div>

    <div class="side-link" onclick="navTo('allowed');toggleMenu()">✅ المسموحات</div>

    <div class="side-link" onclick="navTo('forbidden');toggleMenu()">❌ الممنوعات</div>

    <div class="side-link" onclick="navTo('stores');toggleMenu()">🏪 المتاجر</div>

</div>

<header>

    <h2>نظام الطيبات</h2>

</header>

<!-- HOME -->

<div id="page-home" class="page active">

    <div id="home-content"></div>

</div>

<!-- ALLOWED -->

<div id="page-allowed" class="page">

    <div id="allowed"></div>

</div>

<!-- FORBIDDEN -->

<div id="page-forbidden" class="page">

    <div id="forbidden"></div>

</div>

<!-- STORES -->

<div id="page-stores" class="page">

    <h3 style="margin:20px;">المتاجر 🏪</h3>

    <div class="card-item" onclick="openStores('restaurants')">

        <div class="card-icon">🍽️</div>

        <div>

            <h3>المطاعم</h3>

            <p>عرض المطاعم المتوفرة</p>

        </div>

    </div>

    <div class="card-item" onclick="openStores('markets')">

        <div class="card-icon">🛒</div>

        <div>

            <h3>السوبرماركت</h3>

            <p>عرض السوبرماركت</p>

        </div>

    </div>

    <div id="stores-result"></div>

</div>

<nav class="bottom-nav">

    <button class="nav-btn" onclick="navTo('home')">الرئيسية</button>

    <button class="nav-btn" onclick="navTo('allowed')">المسموحات</button>

    <button class="nav-btn" onclick="navTo('forbidden')">الممنوعات</button>

    <button class="nav-btn" onclick="navTo('stores')">المتاجر</button>

    <button class="nav-btn" onclick="toggleMenu()">القائمة</button>

</nav>

<div class="toast" id="toast"></div>

<script>

function navTo(page){

    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

    document.getElementById('page-'+page).classList.add('active');

}

function toggleMenu(){

    document.getElementById('sidebar').classList.toggle('active');

}

function showToast(msg){

    const t=document.getElementById('toast');

    t.innerText=msg;

    t.style.display='block';

    setTimeout(()=>t.style.display='none',2000);

}

/* STORES DATA */

const restaurants = [

    {name:"مطعم الطيبات",address:"الرياض - النخيل",phone:"0555555555"},

    {name:"مطعم الصحة",address:"الرياض - الروضة",phone:"0501234567"}

];

const markets = [

    {name:"العثيم",address:"الرياض - طريق الملك",phone:"0112345678"},

    {name:"بنده",address:"الرياض - الملقا",phone:"0119876543"}

];

function openStores(type){

    const data = type==="restaurants"?restaurants:markets;

    document.getElementById("stores-result").innerHTML =

    data.map(i=>`

        <div class="card-item">

            <div class="card-icon">${type==="restaurants"?"🍽️":"🛒"}</div>

            <div>

                <h3>${i.name}</h3>

                <p>📍 ${i.address}</p>

                <p>📞 ${i.phone}</p>

            </div>

        </div>

    `).join('');

}

</script>

</body>

</html>
