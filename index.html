<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الطيبات | الإصدار المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a3d2b;
            --primary-light: #2d6a4f;
            --accent: #c9a84c;
            --accent-light: #f0d080;
            --bg-cream: #f8f4e8;
            --white: #ffffff;
            --danger: #e74c3c;
            --text-main: #2c3e50;
            --shadow: 0 10px 30px rgba(26, 61, 43, 0.1);
            --radius-lg: 24px;
            --radius-md: 15px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg-cream); color: var(--text-main); overflow-x: hidden; scroll-behavior: smooth; }

        /* --- Sidebar --- */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; backdrop-filter: blur(4px); }
        .sidebar { position: fixed; right: -280px; top: 0; width: 280px; height: 100%; background: var(--white); z-index: 2001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px 20px; border-radius: 30px 0 0 30px; box-shadow: var(--shadow); }
        .sidebar.active { right: 0; }
        .sidebar-header { margin-bottom: 30px; text-align: center; }
        .side-link { display: flex; align-items: center; gap: 15px; padding: 15px; text-decoration: none; color: var(--primary); font-weight: 700; border-radius: var(--radius-md); transition: 0.3s; margin-bottom: 5px; cursor: pointer; }
        .side-link:hover { background: var(--bg-cream); color: var(--accent); }

        /* --- Header --- */
        header { background: var(--primary); padding: 50px 20px 25px; border-radius: 0 0 40px 40px; color: white; position: relative; box-shadow: var(--shadow); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 50px; height: 50px; background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-family: 'Amiri'; font-size: 20px; color: var(--primary); font-weight: bold; }

        /* --- Pages --- */
        .page { display: none; padding-bottom: 120px; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Lists Cards --- */
        .content-area { padding: 0 20px; }
        .card-item { background: white; border-radius: var(--radius-md); padding: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 18px; box-shadow: var(--shadow); border-right: 5px solid var(--primary-light); }
        .card-item.forbidden { border-right-color: var(--danger); }
        .card-icon { width: 55px; height: 55px; background: var(--bg-cream); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
        .card-info h3 { font-size: 15px; font-weight: 800; color: var(--primary); margin-bottom: 4px; }
        .card-info p { font-size: 11px; color: #666; line-height: 1.5; }
        .recipe-details { font-size: 11px; color: var(--primary-light); margin-top: 8px; background: #f0f7f4; padding: 8px; border-radius: 8px; border: 1px solid #e0eee8; }

        .reminder-card { background: linear-gradient(135deg, var(--accent), #b38f2d); padding: 15px 20px; border-radius: var(--radius-md); margin: 25px 20px 25px; color: white; display: flex; align-items: center; gap: 15px; box-shadow: 0 8px 20px rgba(201, 168, 76, 0.3); }
        .tab-bar { display: flex; overflow-x: auto; padding: 0 20px; gap: 10px; scrollbar-width: none; margin-bottom: 20px; }
        .tab { background: white; padding: 10px 22px; border-radius: 30px; font-weight: 700; font-size: 13px; color: var(--primary); white-space: nowrap; cursor: pointer; }
        .tab.active { background: var(--primary); color: white; }

        /* --- Bottom Nav --- */
        .bottom-nav { position: fixed; bottom: 20px; left: 10px; right: 10px; background: var(--primary); border-radius: 25px; padding: 12px 5px; display: flex; justify-content: space-around; box-shadow: 0 15px 35px rgba(26,61,43,0.3); z-index: 1000; }
        .nav-btn { background: none; border: none; color: rgba(255,255,255,0.5); font-family: 'Tajawal'; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex: 1; }
        .nav-btn.active { color: var(--accent-light); }
        .nav-btn svg { width: 22px; height: 22px; }

        .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 30px; border-radius: 50px; font-size: 13px; z-index: 3000; display: none; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon" style="margin: 0 auto 10px;">ط</div>
            <h2 style="color:var(--primary); font-size: 18px;">نظام الطيبات</h2>
        </div>
        <div class="side-link" onclick="navTo('home'); toggleMenu()"><span>🏠</span> الرئيسية</div>
        <div class="side-link" onclick="navTo('allowed'); toggleMenu()"><span>✅</span> المسموحات</div>
        <div class="side-link" onclick="navTo('forbidden'); toggleMenu()"><span>❌</span> الممنوعات</div>
        <div class="side-link" onclick="navTo('recipes'); toggleMenu()"><span>👩‍🍳</span> وصفات الطيبات</div>
        <div class="side-link" onclick="navTo('stores'); toggleMenu()"><span>🛒</span> أماكن الشراء</div>
    </div>

    <header>
        <div class="nav-top">
            <div class="logo-box">
                <div class="logo-icon">ط</div>
                <div>
                    <h1 style="font-size: 18px; font-weight: 900;">نظام الطيبات</h1>
                    <p style="font-size: 10px; opacity: 0.8;">العودة إلى الغذاء الفطري</p>
                </div>
            </div>
            <div class="menu-toggle" onclick="toggleMenu()" style="cursor:pointer; font-size: 24px;">☰</div>
        </div>
    </header>

    <div id="page-home" class="page active">
        <div id="reminder-box"></div>
        <div class="tab-bar" id="day-tabs"></div>
        <div class="content-area" id="schedule-list"></div>
    </div>

    <div id="page-allowed" class="page">
        <div style="padding: 20px 20px 5px;"><h2 style="font-size: 18px; color: var(--primary);">قائمة المسموحات ✅</h2></div>
        <div class="content-area" id="allowed-list"></div>
    </div>

    <div id="page-forbidden" class="page">
        <div style="padding: 20px 20px 5px;"><h2 style="font-size: 18px; color: var(--danger);">قائمة الممنوعات ❌</h2></div>
        <div class="content-area" id="forbidden-list"></div>
    </div>

    <div id="page-recipes" class="page">
        <div style="padding: 20px 20px 15px;"><h2 style="font-size: 18px; color: var(--primary);">أشهى وصفات الطيبات 👩‍🍳</h2></div>
        <div class="content-area" id="recipes-list"></div>
    </div>

    <div id="page-stores" class="page">
        <div style="padding: 20px 20px 15px;"><h2 style="font-size: 18px; color: var(--primary);">أماكن الشراء 🛒</h2></div>
        <div class="content-area" id="stores-list"></div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" id="btn-home" onclick="navTo('home')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>الجدول</span>
        </button>
        <button class="nav-btn" id="btn-allowed" onclick="navTo('allowed')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            <span>المسموحات</span>
        </button>
        <button class="nav-btn" id="btn-forbidden" onclick="navTo('forbidden')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            <span>الممنوعات</span>
        </button>
        <button class="nav-btn" id="btn-recipes" onclick="navTo('recipes')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M8.1,13.34l2.83-2.83L3.91,3.5c-1.56,1.56-1.56,4.09,0,5.66L8.1,13.34z M12.04,12.04l-2.83,2.83l7.02,7.02l2.83-2.83 L12.04,12.04z M20.49,3.51c-1.56-1.56-4.09-1.56-5.66,0l-4.24,4.24l2.83,2.83l4.24-4.24c0.78-0.78,2.05-0.78,2.83,0l1.41,1.41 L23.32,6.34L20.49,3.51z"/></svg>
            <span>الوصفات</span>
        </button>
    </nav>

    <div class="toast" id="toast"></div>

    <script>
        const days = ["السبت", "الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"];
        let currentDay = "السبت";

        // --- بيانات المسموحات ---
        const allowedData = [
            { icon: '🍞', t: 'توست بالردة', d: 'ريتش بيك حصراً (البني)' },
            { icon: '🫒', t: 'دهون طيبة', d: 'زيت زيتون، زبدة وسمن بلدي، قشطة بلدي' },
            { icon: '🧀', t: 'أجبان مطبوخة وشيدر', d: 'شيدر، موتزريلا، كشكفال، برميزان، رومي' },
            { icon: '🍚', t: 'نشويات', d: 'أرز، بطاطس، بطاطا، قرع، قلقاس، فريك، مشروم' },
            { icon: '🍎', t: 'فواكه', d: 'كل الأنواع ما عدا البطيخ. التفاح والكمثرى بدون قشر.' },
            { icon: '🥩', t: 'البروتينات', d: 'لحم ضاني، بقري مسلوق جيداً، حمام، سمان، أرانب، أسماك' }
        ];

        // --- بيانات الممنوعات (بالحرف) ---
        const forbiddenData = [
            { icon: '🍗', t: 'الدجاج وملحقاته', d: 'ممنوع الفراخ، الكبد وقوانص الفراخ، البط، والديك الرومي' },
            { icon: '🥚', t: 'البيض', d: 'ممنوع بكافة أشكاله' },
            { icon: '🥛', t: 'الألبان', d: 'ممنوع اللبن، الزبادي، الرايب، والجبنة القريش' },
            { icon: '🍞', t: 'الدقيق الأبيض', d: 'فينو، مكرونة، كيك، مخبوزات، حلويات شرقيه' },
            { icon: '🥗', t: 'الخضار النيء', d: 'سلطة، خيار، خس، جرجير، فلفل ألوان' },
            { icon: '🥤', t: 'المشروبات', d: 'مياه غازية، مبيضات القهوة' }
        ];

        // --- بيانات الوصفات (محدثة ومطابقة للنظام) ---
        const recipesData = [
            { 
                icon: "🍲", 
                t: "فتة كوارع الطيبات", 
                ingredients: "كوارع، أرز أبيض، توست ريتش بيك محمص، سمن بلدي، خل، ملح، فلفل.", 
                method: "تُسلق الكوارع جيداً حتى النضج التام. يُقطع التوست ويُحمص بالسمن البلدي. يُوضع الأرز فوق التوست ثم تُسقى بشوربة الكوارع المركزة والخل والملح (بدون ثوم)." 
            },
            { 
                icon: "🥩", 
                t: "كبدة ضاني بالقشطة", 
                ingredients: "كبدة ضاني، سمن بلدي، ملح، فلفل، ملعقة كبيرة قشطة بلدي.", 
                method: "تُقطع الكبدة شرائح رقيقة وتُشوح سريعاً في السمن البلدي. يُضاف الملح والفلفل. قبل الإطفاء، تُضاف ملعقة القشطة لتعزيز الدهون الطيبة." 
            },
            { 
                icon: "🍚", 
                t: "أرز معمر بالشوربة والقشطة", 
                ingredients: "أرز مصري، شوربة لحم دسمة، قشطة بلدي كثيرة، سمن بلدي.", 
                method: "يُغسل الأرز ويُوضع في برام. بدلاً من الحليب، يُسقى بشوربة اللحم الدسمة. تُغطى القمة بطبقة سميكة من القشطة والسمن ويُدخل الفرن." 
            },
            { 
                icon: "🥔", 
                t: "صينية بطاطس بالضاني", 
                ingredients: "بطاطس مكعبات، لحم ضاني، مرق لحم، سمن بلدي، فلفل أسود.", 
                method: "يُسلق اللحم جيداً. تُوضع البطاطس في صينية مع المرق والسمن واللحم، وتدخل الفرن حتى تمام الذوبان." 
            },
            { 
                icon: "🐟", 
                t: "سمك في الفرن بزيت الزيتون", 
                ingredients: "سمك (بلطي أو بوري)، زيت زيتون، ملح، كمون، ليمون.", 
                method: "يُنظف السمك ويُتبل بالملح والكمون والليمون فقط. يُغمر بزيت الزيتون ويُدخل الفرن حتى ينضج." 
            },
            { 
                icon: "🍯", 
                t: "تحلية التوست بالعسل والقشطة", 
                ingredients: "توست ريتش بيك، قشطة بلدي، عسل نحل.", 
                method: "يُحمص التوست قليلاً. تُفرد القشطة البلدي بغزارة ثم يُصب فوقها عسل النحل." 
            },
            { 
                icon: "🥣", 
                t: "مشروم بالسمن والبهارات", 
                ingredients: "مشروم طازج، سمن بلدي، ملح، فلفل أسود.", 
                method: "يُشوح المشروم في السمن البلدي حتى يتغير لونه ويذبل. وجبة غنية بالبروتين النباتي المسموح." 
            },
            { 
                icon: "🎃", 
                t: "قرع عسلي بالسمن والعسل", 
                ingredients: "قطع قرع عسلي، سمن بلدي، عسل نحل.", 
                method: "يُسلق القرع أو يُشوى، ثم يُهرس مع السمن البلدي ويُحلى بعسل النحل." 
            }
        ];

        const weeklyMenu = {
            "السبت": [{ type: "فطور", t: "توست وقشطة وعسل", d: "توست ريتش بيك", i: "🍯" }, { type: "غداء", t: "أرز وبطاطس مطبوخة", d: "بالشوربة والسمن", i: "🍚" }, { type: "عشاء", t: "بطاطا مشوية", d: "وجبة دافئة", i: "🍠" }],
            "الأحد": [{ type: "فطور", t: "طحينة وعسل أسود", d: "مع توست الردة", i: "🥣" }, { type: "غداء", t: "سمك مشوي وأرز", d: "سمك بوري أو بلطي", i: "🐟" }, { type: "عشاء", t: "مربى وقشطة", d: "بدون لبن", i: "🍓" }],
            "الاثنين": [{ type: "سحور", t: "7 تمرات وقشطة", d: "سنة نبوية", i: "🌴" }, { type: "إفطار", t: "لحم ضاني مسلوق", d: "أرز بالشوربة", i: "🍲" }, { type: "سهرة", t: "فاكهة مقشرة", d: "تفاح أو كمثرى", i: "🍎" }],
            "الثلاثاء": [{ type: "فطور", t: "مشروم مشوح", d: "بالسمن البلدي", i: "🍄" }, { type: "غداء", t: "حمام محشي أرز", d: "مطبوخ جيداً", i: "🕊️" }, { type: "عشاء", t: "بطاطس محمرة", d: "بزيت زيتون", i: "🍟" }],
            "الأربعاء": [{ type: "فطور", t: "حلاوة طحينية", d: "توست ريتش بيك", i: "🥪" }, { type: "غداء", t: "كوارع وفتة", d: "بدون ثوم", i: "🥘" }, { type: "عشاء", t: "عصير مانجو", d: "مصفى تماماً", i: "🥭" }],
            "الخميس": [{ type: "سحور", t: "بطاطا مهروسة", d: "بالسمن والعسل", i: "🍠" }, { type: "إفطار", t: "أرانب ولسان عصفور", d: "شوربة أرانب دسمة", i: "🐇" }, { type: "سهرة", t: "شوكولاتة داكنة", d: "قطعة صغيرة", i: "🍫" }],
            "الجمعة": [{ type: "فطور", t: "توست وزيت زيتون", d: "مع زعتر (اختياري)", i: "🫒" }, { type: "غداء", t: "كبدة ضاني وقشطة", d: "مع توست ريتش بيك", i: "🥩" }, { type: "عشاء", t: "جيلو فواكه", d: "صنع منزلي", i: "🍧" }]
        };

        const storeData = [
            { name: "ريتش بيك", icon: "🍞", address: "متوفر في أغلب السوبر ماركت (التوست البني)" },
            { name: "أماكن بيع السمن البلدي", icon: "🫙", address: "الموثوقة في منطقتك" },
            { name: "محلات الأسماك", icon: "🐟", address: "لطلب السمك المشوي أو السنجاري" }
        ];

        function init() {
            renderTabs();
            renderDay("السبت");
            renderLists();
            renderRecipes();
            renderStores();
        }

        function renderTabs() {
            const h = document.getElementById('day-tabs');
            h.innerHTML = days.map(d => `<div class="tab ${d===currentDay?'active':''}" onclick="renderDay('${d}')">${d}</div>`).join('');
        }

        function renderDay(day) {
            currentDay = day;
            renderTabs();
            const list = document.getElementById('schedule-list');
            list.innerHTML = weeklyMenu[day].map(m => `
                <div class="card-item">
                    <div class="card-icon">${m.i}</div>
                    <div class="card-info">
                        <span style="font-size:10px; color:var(--accent); font-weight:900;">${m.type}</span>
                        <h3>${m.t}</h3><p>${m.d}</p>
                    </div>
                </div>
            `).join('');
            updateReminder(day);
        }

        function renderRecipes() {
            const list = document.getElementById('recipes-list');
            list.innerHTML = recipesData.map(r => `
                <div class="card-item">
                    <div class="card-icon">${r.icon}</div>
                    <div class="card-info">
                        <h3>${r.t}</h3>
                        <div class="recipe-details"><b>المكونات:</b> ${r.ingredients}</div>
                        <p style="margin-top:5px;"><b>الطريقة:</b> ${r.method}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderLists() {
            document.getElementById('allowed-list').innerHTML = allowedData.map(i => `<div class="card-item"><div class="card-icon">${i.icon}</div><div class="card-info"><h3>${i.t}</h3><p>${i.d}</p></div></div>`).join('');
            document.getElementById('forbidden-list').innerHTML = forbiddenData.map(i => `<div class="card-item forbidden"><div class="card-icon">${i.icon}</div><div class="card-info"><h3>${i.t}</h3><p>${i.d}</p></div></div>`).join('');
        }

        function renderStores() {
            document.getElementById('stores-list').innerHTML = storeData.map(s => `<div class="card-item"><div class="card-icon">${s.icon}</div><div class="card-info"><h3>${s.name}</h3><p>📍 ${s.address}</p></div></div>`).join('');
        }

        function updateReminder(day) {
            const box = document.getElementById('reminder-box');
            let txt = (day === "الاثنين" || day === "الخميس") ? "تذكير بالصيام" : "قاعدة ذهبية";
            let sub = (day === "الاثنين" || day === "الخميس") ? "صيام سنة نبوية يريح جهازك الهضمي." : "البروتين يوم بعد يوم، والدهون الطيبة أساس الشفاء.";
            box.innerHTML = `<div class="reminder-card"><span>💡</span><div><b>${txt}</b><p>${sub}</p></div></div>`;
        }

        function navTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('page-'+page).classList.add('active');
            const btn = document.getElementById('btn-'+page);
            if(btn) btn.classList.add('active');
            window.scrollTo(0,0);
        }

        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }

        window.onload = init;
    </script>
</body>
</html>
