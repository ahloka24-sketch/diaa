<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الطيبات | د. ضياء العوضي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a3d2b;
            --primary-light: #2d6a4f;
            --accent: #c9a84c;
            --accent-light: #f0d080;
            --bg-cream: #f8f4e8;
            --white: #ffffff;
            --danger: #e74c3c;
            --text-main: #2c3e50;
            --shadow: 0 10px 30px rgba(26, 61, 43, 0.1);
            --radius-lg: 24px;
            --radius-md: 15px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg-cream); color: var(--text-main); overflow-x: hidden; }

        /* --- Sidebar & Overlay --- */
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; backdrop-filter: blur(4px); }
        .sidebar { position: fixed; right: -280px; top: 0; width: 280px; height: 100%; background: var(--white); z-index: 2001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px 20px; border-radius: 30px 0 0 30px; box-shadow: var(--shadow); }
        .sidebar.active { right: 0; }
        .sidebar-header { margin-bottom: 30px; text-align: center; }
        .side-link { display: flex; align-items: center; gap: 15px; padding: 15px; text-decoration: none; color: var(--primary); font-weight: 700; border-radius: var(--radius-md); transition: 0.3s; margin-bottom: 5px; }
        .side-link:hover { background: var(--bg-cream); color: var(--accent); }

        /* --- Header & Logo --- */
        header { background: var(--primary); padding: 50px 20px 25px; border-radius: 0 0 40px 40px; color: white; position: relative; box-shadow: var(--shadow); }
        .nav-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-box { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 50px; height: 50px; background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-family: 'Amiri'; font-size: 20px; color: var(--primary); font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .menu-toggle { font-size: 24px; cursor: pointer; color: white; }

        /* --- Reminder Banner --- */
        .reminder-card { background: linear-gradient(135deg, var(--accent), #b38f2d); padding: 15px 20px; border-radius: var(--radius-md); margin: -20px 20px 25px; color: white; display: flex; align-items: center; gap: 15px; box-shadow: 0 8px 20px rgba(201, 168, 76, 0.3); position: relative; z-index: 10; }
        .reminder-card.fasting { background: linear-gradient(135deg, #2d6a4f, #1a3d2b); }

        /* --- Navigation Tabs --- */
        .tab-bar { display: flex; overflow-x: auto; padding: 0 20px; gap: 10px; scrollbar-width: none; margin-bottom: 20px; }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab { background: white; padding: 10px 22px; border-radius: 30px; font-weight: 700; font-size: 13px; color: var(--primary); white-space: nowrap; cursor: pointer; transition: 0.3s; border: 1px solid rgba(0,0,0,0.05); }
        .tab.active { background: var(--primary); color: white; }

        /* --- Meal Cards --- */
        .content-area { padding: 0 20px 100px; }
        .meal-item { background: white; border-radius: var(--radius-md); padding: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 18px; box-shadow: var(--shadow); position: relative; overflow: hidden; border: 1px solid rgba(0,0,0,0.03); }
        .meal-type { position: absolute; top: 0; left: 0; padding: 4px 12px; background: var(--bg-cream); color: var(--accent); font-size: 10px; font-weight: 800; border-radius: 0 0 12px 0; }
        .meal-img { width: 70px; height: 70px; border-radius: 18px; background: var(--bg-cream); display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .meal-info h3 { font-size: 16px; font-weight: 800; color: var(--primary); margin-bottom: 5px; }
        .meal-info p { font-size: 12px; color: #666; line-height: 1.5; }

        /* --- Bottom Nav --- */
        .bottom-nav { position: fixed; bottom: 20px; left: 20px; right: 20px; background: var(--primary); border-radius: 25px; padding: 12px 5px; display: flex; justify-content: space-around; box-shadow: 0 15px 35px rgba(26,61,43,0.3); z-index: 1000; }
        .nav-btn { background: none; border: none; color: rgba(255,255,255,0.5); font-family: 'Tajawal'; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--accent-light); }
        .nav-btn svg { width: 24px; height: 24px; }

        /* --- Settings/Toast --- */
        .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 12px 25px; border-radius: 50px; font-size: 13px; z-index: 3000; display: none; }

        /* --- Animations --- */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: slideUp 0.5s ease forwards; }
    </style>
</head>
<body>

    <div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon" style="margin: 0 auto 15px;">ط</div>
            <h2 style="color:var(--primary); font-size: 18px;">نظام الطيبات</h2>
        </div>
        <a href="#" class="side-link" onclick="showToast('جاري ضبط التنبيهات...')"><span>🔔</span> إعدادات التنبيه</a>
        <a href="#" class="side-link" onclick="showToast('سيتم التحميل قريباً')"><span>📥</span> تحميل قائمة PDF</a>
        <a href="#" class="side-link" onclick="showToast('تواصل مع د. ضياء')"><span>💬</span> استشارات طبية</a>
        <a href="#" class="side-link" onclick="showToast('تم تحديث البيانات')"><span>🔄</span> تحديث النظام</a>
        <hr style="opacity: 0.1; margin: 20px 0;">
        <a href="#" class="side-link" style="color: var(--danger);"><span>🚪</span> خروج</a>
    </div>

    <header>
        <div class="nav-top">
            <div class="logo-box">
                <div class="logo-icon">ط</div>
                <div>
                    <h1 style="font-size: 20px; font-weight: 900;">نظام الطيبات</h1>
                    <p style="font-size: 11px; opacity: 0.8;">دليلك الصحي - د. ضياء العوضي</p>
                </div>
            </div>
            <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        </div>
    </header>

    <div id="reminder-container">
        <div class="reminder-card fasting">
            <span style="font-size: 24px;">🌙</span>
            <div>
                <b style="font-size: 14px; display: block;">تذكير صيام الاثنين</b>
                <p style="font-size: 11px;">"صيامك يطهر جسدك ويعزز نظام الطيبات."</p>
            </div>
        </div>
    </div>

    <div class="tab-bar" id="day-tabs">
        </div>

    <div class="content-area" id="schedule-content">
        </div>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="showToast('أنت في الرئيسية')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>الرئيسية</span>
        </button>
        <button class="nav-btn" onclick="showToast('قائمة المسموحات قيد التصفح')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            <span>المسموحات</span>
        </button>
        <button class="nav-btn" onclick="showToast('الممنوعات: يرجى الحذر')">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>
            <span>الممنوعات</span>
        </button>
        <button class="nav-btn" onclick="toggleMenu()">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
            <span>المزيد</span>
        </button>
    </nav>

    <div class="toast" id="toast">تم تحديث البيانات</div>

    <script>
        const days = ["السبت", "الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"];
        let activeDay = "السبت";

        const scheduleData = {
            "السبت": [
                { type: "فطور", title: "توست ريتش بيك بالأجبان", desc: "توست ردة محمص مع جبنة شيدر وزيت زيتون", icon: "🥪" },
                { type: "غداء", title: "أرز وبطاطس مطبوخة", desc: "أرز مصري مفلفل مع صينية بطاطس بالسمن البلدي", icon: "🍚" },
                { type: "عشاء", title: "مربى وقشطة", desc: "توست مع مربى فراولة وقشطة طبيعية", icon: "🍯" }
            ],
            "الاثنين": [
                { type: "سحور", title: "تمر وماء", desc: "سنة نبوية لدعم الصيام", icon: "🌴" },
                { type: "إفطار", title: "شوربة لسان عصفور ولحم", desc: "لحم بقري مسلوق جيداً ومحمر مع شوربة دافئة", icon: "🍲" },
                { type: "سهرة", title: "بسبوسة بالمكسرات", desc: "قطعة بسبوسة (بدون لبن/بيض) مع قهوة", icon: "☕" }
            ]
        };

        function init() {
            renderTabs();
            renderSchedule("السبت");
            updateReminders();
        }

        function renderTabs() {
            const container = document.getElementById('day-tabs');
            container.innerHTML = days.map(d => `
                <div class="tab ${d === activeDay ? 'active' : ''}" onclick="changeDay('${d}')">${d}</div>
            `).join('');
        }

        function changeDay(day) {
            activeDay = day;
            renderTabs();
            renderSchedule(day);
            updateReminders();
        }

        function renderSchedule(day) {
            const container = document.getElementById('schedule-content');
            const data = scheduleData[day] || scheduleData["السبت"]; // Fallback for demo
            
            container.innerHTML = data.map((meal, index) => `
                <div class="meal-item fade-in" style="animation-delay: ${index * 0.1}s">
                    <div class="meal-type">${meal.type}</div>
                    <div class="meal-img">${meal.icon}</div>
                    <div class="meal-info">
                        <h3>${meal.title}</h3>
                        <p>${meal.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        function updateReminders() {
            const container = document.getElementById('reminder-container');
            if (activeDay === "الاثنين" || activeDay === "الخميس") {
                container.innerHTML = `
                    <div class="reminder-card fasting fade-in">
                        <span style="font-size: 24px;">🌙</span>
                        <div>
                            <b style="font-size: 14px; display: block;">تذكير صيام ${activeDay}</b>
                            <p style="font-size: 11px;">"صيامك يطهر جسدك ويعزز فاعلية نظام الطيبات."</p>
                        </div>
                    </div>`;
            } else {
                container.innerHTML = `
                    <div class="reminder-card fade-in">
                        <span style="font-size: 24px;">💡</span>
                        <div>
                            <b style="font-size: 14px; display: block;">نصيحة اليوم</b>
                            <p style="font-size: 11px;">"تذكر: البروتين يوم بعد يوم وليس يومياً لراحة جهازك الهضمي."</p>
                        </div>
                    </div>`;
            }
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').style.display = 
                document.getElementById('sidebar').classList.contains('active') ? 'block' : 'none';
        }

        function showToast(text) {
            const t = document.getElementById('toast');
            t.textContent = text;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        window.onload = init;
    </script>
</body>
</html>
