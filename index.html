<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الطيبات | غذاء ودواء</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS VARIABLES ===== */
:root {
  --green-dark: #1a3d2b;
  --green-mid: #2d6a4f;
  --green-light: #52b788;
  --green-pale: #b7e4c7;
  --gold: #c9a84c;
  --gold-light: #f0d080;
  --cream: #f8f4e8;
  --cream-dark: #ede8d5;
  --red: #c0392b;
  --white: #ffffff;
  --text-dark: #1a1a1a;
  --text-mid: #3d3d3d;
  --shadow-sm: 0 2px 12px rgba(26,61,43,0.10);
  --shadow-md: 0 6px 32px rgba(26,61,43,0.15);
  --shadow-lg: 0 16px 64px rgba(26,61,43,0.20);
  --radius: 18px;
  --radius-sm: 10px;
}

/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Tajawal', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== PAGES SYSTEM ===== */
.page { display: none; min-height: 100vh; }
.page.active { display: block; animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ===== TOP NAV ===== */
.top-nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--green-dark);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.top-nav .logo-area { display: flex; align-items: center; gap: 10px; }
.top-nav .logo-circle {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Amiri', serif; font-size: 13px; color: var(--green-dark);
  font-weight: 700; border: 2px solid var(--gold-light);
}
.top-nav .app-name { color: var(--white); font-size: 18px; font-weight: 700; line-height: 1.1; }
.top-nav .app-sub { color: var(--green-pale); font-size: 11px; }
.menu-btn { background: none; border: none; cursor: pointer; padding: 6px; }
.menu-btn span {
  display: block; width: 24px; height: 2.5px; background: var(--white);
  margin: 5px 0; border-radius: 2px; transition: all 0.3s;
}

/* ===== BOTTOM NAVBAR ===== */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--green-dark);
  display: flex; justify-content: space-around; align-items: center;
  padding: 10px 0 16px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.25);
}
.bottom-nav .nav-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 4px; cursor: pointer; padding: 4px 12px;
  border-radius: var(--radius-sm);
  transition: all 0.25s; border: none; background: none; color: #7aab8a;
  font-family: 'Tajawal', sans-serif; font-size: 11px;
}
.bottom-nav .nav-item.active { color: var(--gold-light); }
.bottom-nav .nav-item svg { width: 22px; height: 22px; }
.bottom-nav .nav-item span { font-weight: 500; }

/* ===== PAGE CONTENT WRAPPER ===== */
.page-content { padding: 20px 16px 90px; }

/* ===== HOME PAGE ===== */
.hero-banner {
  background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
  border-radius: var(--radius);
  padding: 28px 22px;
  margin-bottom: 22px;
  position: relative; overflow: hidden;
}
.hero-banner h1 { color: var(--white); font-size: 26px; font-weight: 900; margin-bottom: 6px; line-height: 1.3; }
.hero-banner p { color: var(--green-pale); font-size: 14px; line-height: 1.6; margin-bottom: 18px; }

.section-title {
  font-size: 20px; font-weight: 800; color: var(--green-dark);
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.section-title::after {
  content: ''; flex: 1; height: 2px;
  background: linear-gradient(to left, transparent, var(--green-pale));
}

/* Quick Cards */
.quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.quick-card {
  background: var(--white); border-radius: var(--radius);
  padding: 18px 14px; text-align: center;
  box-shadow: var(--shadow-sm); cursor: pointer;
  transition: all 0.25s; border: 2px solid transparent;
  text-decoration: none;
}
.quick-card:hover { border-color: var(--green-light); transform: translateY(-2px); }
.quick-card .qc-icon {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px; font-size: 26px;
}
.quick-card .qc-title { font-size: 14px; font-weight: 700; color: var(--green-dark); margin-bottom: 4px; }

/* ===== SCHEDULE PAGE ===== */
.week-tabs {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 20px;
  scrollbar-width: none;
}
.week-tabs::-webkit-scrollbar { display: none; }
.week-tab {
  flex-shrink: 0; padding: 8px 16px; border-radius: 30px;
  background: var(--white); border: 2px solid var(--cream-dark);
  font-family: 'Tajawal', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; color: var(--text-mid);
  white-space: nowrap;
}
.week-tab.active { background: var(--green-dark); border-color: var(--green-dark); color: var(--white); }

.meal-section { margin-bottom: 20px; }
.meal-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  padding: 10px 14px; background: var(--green-dark); border-radius: var(--radius-sm);
  color: var(--white); font-size: 15px; font-weight: 700;
}
.meal-card {
  background: var(--white); border-radius: var(--radius);
  padding: 14px; display: flex; align-items: center; gap: 12px;
  box-shadow: var(--shadow-sm); margin-bottom: 10px; cursor: pointer;
}
.meal-img {
  width: 64px; height: 64px; border-radius: var(--radius-sm);
  background: var(--cream-dark); overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 28px;
}
.meal-info { flex: 1; }
.meal-name { font-size: 15px; font-weight: 700; color: var(--green-dark); margin-bottom: 3px; }
.meal-desc { font-size: 12px; color: #888; line-height: 1.4; }
.meal-tag {
  font-size: 10px; padding: 3px 8px; border-radius: 20px;
  background: var(--cream-dark); color: var(--green-mid); font-weight: 600;
  display: inline-block; margin-top: 6px;
}

/* ===== HERBS PAGE ===== */
.search-box { position: relative; margin-bottom: 20px; }
.search-box input {
  width: 100%; padding: 14px 50px 14px 20px;
  border: 2px solid var(--cream-dark); border-radius: 50px;
  font-family: 'Tajawal', sans-serif; font-size: 15px;
  outline: none; background: var(--white);
}
.search-box .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--green-mid); }

.herbs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.herb-card {
  background: var(--white); border-radius: var(--radius);
  overflow: hidden; box-shadow: var(--shadow-sm);
  cursor: pointer; transition: all 0.25s;
}
.herb-emoji-bg { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 42px; }
.herb-body { padding: 12px; }
.herb-name { font-size: 15px; font-weight: 800; color: var(--green-dark); margin-bottom: 4px; }
.herb-benefits { font-size: 11px; color: #666; line-height: 1.5; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; align-items: flex-end; }
.modal-sheet {
  width: 100%; max-height: 90vh; overflow-y: auto;
  background: var(--cream); border-radius: 24px 24px 0 0;
  padding-bottom: 30px; position: relative;
}
.modal-hero { height: 160px; display: flex; align-items: center; justify-content: center; font-size: 80px; margin: 10px 16px; border-radius: var(--radius); }
.modal-body { padding: 0 20px; }
.info-card { background: var(--white); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow-sm); }
.info-card h3 { font-size: 15px; color: var(--green-mid); margin-bottom: 10px; }
.info-card ul { list-style: none; }
.info-card ul li { font-size: 13px; padding: 5px 0; border-bottom: 1px solid var(--cream-dark); line-height: 1.6; }
.close-modal { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.3); border: none; width: 36px; height: 36px; border-radius: 50%; color: white; }

/* Toast */
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: var(--green-dark); color: white; padding: 10px 20px;
  border-radius: 30px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity 0.3s;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="page active" id="page-home">
  <nav class="top-nav">
    <div class="logo-area">
      <div class="logo-circle">طيبات</div>
      <div>
        <div class="app-name">نظام الطيبات</div>
        <div class="app-sub">غذاء ودواء</div>

  </nav>

  <div class="page-content">
    <div class="hero-banner">
      <h1>مرحباً بك في<br>نظام الطيبات 🌿</h1>
      <p>نظام متكامل للصحة والغذاء الطبيعي المعتمد على الطيبات النبوية لتحقيق صحة أفضل وحياة متوازنة.</p>
    </div>

    <div class="section-title">الأقسام الرئيسية</div>
    <div class="quick-grid">
      <div class="quick-card" onclick="goTo('page-schedule')">

    <button class="nav-item" onclick="goTo('page-schedule')">

</div>

  <nav class="top-nav">
    <div class="logo-area">

    <button class="nav-item active" onclick="goTo('page-schedule')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/></svg><span>الجدول</span></button>

<script>
// ===========================
// UPDATED DATA FROM IMAGES
// ===========================
const HERBS = [
  {
    id: 1, name: 'عسل نحل طالوقي', emoji: '🍯', 
    bg: '#fff8e1', summary: 'عسل سدر جبلي أصلي بفوائد علاجية عالية',
    benefits: ['مضاد حيوي طبيعي','مقوي للمناعة','علاج لمشاكل الهضم والقولون'],
    usage: ['ملعقة على الريق صباحاً','يحل في ماء دافئ']
  },
  {
    id: 2, name: 'زيت زيتون بكر', emoji: '🫒', 
    bg: '#f1f8e9', summary: 'عصرة أولى على البارد لمضادات الأكسدة',
    benefits: ['صحة القلب والشرايين','تخفيض الكوليسترول','مفيد للبشرة والشعر'],
    usage: ['إضافته للسلطات والأجبان','ملعقة يومياً قبل النوم']
  },
  {
    id: 3, name: 'تمر (عجوة المدينة)', emoji: '🌴', 
    bg: '#fbe9e7', summary: 'منجم من الفيتامينات والمعادن والطاقة',
    benefits: ['حماية من السموم والسحر','علاج للأنيميا ونقص الحديد','غذاء مثالي للأطفال والرياضيين'],
    usage: ['7 تمرات صباحاً','بديل صحي للحلويات']
  },
  {
    id: 4, name: 'القسط الهندي', emoji: '🪵', 
    bg: '#efebe9', summary: 'شفاء من سبعة أصلية في الطب النبوي',
    benefits: ['تنظيم الهرمونات','علاج لمشاكل الغدة','مضاد للالتهابات الفيروسية'],
    usage: ['ملعقة صغيرة مع الماء','يخلط مع العسل والزيت']
  }
];

const SCHEDULE = {
  'السبت': {
    breakfast: [{emoji:'🍯', name:'عسل وزيت زيتون', desc:'ملعقة عسل سدر + ملعقة زيت زيتون بكر', tag:'نشاط'}],
    lunch: [{emoji:'🥘', name:'فراخ منزوعة الجلد', desc:'دجاج مطهو بالأعشاب والكركم والثوم', tag:'بروتين'}],
    dinner: [{emoji:'🥗', name:'سلطة خضراء', desc:'خضروات متنوعة مع الليمون وزيت الزيتون', tag:'خفيف'}]
  },
  'الأحد': {
    breakfast: [{emoji:'🌴', name:'7 تمرات مع حليب', desc:'تمرات المدينة مع حليب طبيعي دافئ', tag:'طاقة'}],
    lunch: [{emoji:'🥘', name:'فريك بالخضروات', desc:'حبوب كاملة مع تشكيلة خضار موسمية', tag:'ألياف'}],
    dinner: [{emoji:'🥛', name:'كوب لبن رائب', desc:'لبن طبيعي مهضم ومريح للمعدة', tag:'هضم'}]
  },
  'الإثنين': {
    breakfast: [{emoji:'🥚', name:'بيض مسلوق وزعتر', desc:'بروتين عالي مع زعتر وزيت زيتون', tag:'متكامل'}],
    lunch: [{emoji:'🥘', name:'لحم ضاني (كتف)', desc:'لحم مطهو جيداً بدون دهون كثيفة', tag:'حديد'}],
    dinner: [{emoji:'🍏', name:'فاكهة موسمية', desc:'تفاح أو برتقال حسب المتوفر', tag:'فيتامينات'}]
  },
  'الثلاثاء': {
    breakfast: [{emoji:'🥣', name:'تلبينة نبوية', desc:'دقيق شعير مع حليب وعسل نحل', tag:'هدوء'}],
    lunch: [{emoji:'🐟', name:'سمك مشوي', desc:'سمك غني بالأوميجا 3 مع الثوم والليمون', tag:'ذكاء'}],
    dinner: [{emoji:'🍲', name:'شوربة خضار', desc:'مرق طبيعي مع كوسة وجزر وبطاطس', tag:'صحي'}]
  },
  'الأربعاء': {
    breakfast: [{emoji:'🥪', name:'خبز أسمر بجبن قريش', desc:'جبن طبيعي مع حبة البركة وزيت زيتون', tag:'كالسيوم'}],
    lunch: [{emoji:'🍲', name:'بقوليات (عدس/فول)', desc:'بروتين نباتي مطهو بزيت الزيتون', tag:'شبع'}],
    dinner: [{emoji:'🍇', name:'عنب أو زبيب', desc:'غذاء مقوي للذاكرة ومصفي للدم', tag:'تركيز'}]
  },
  'الخميس': {
    breakfast: [{emoji:'🥛', name:'زبادي بالعسل', desc:'زبادي طبيعي مع ملعقة عسل نحل', tag:'بروبيوتيك'}],
    lunch: [{emoji:'🍗', name:'رومي مشوي', desc:'شرائح ديك رومي مع خضار سوتيه', tag:'عضلات'}],
    dinner: [{emoji:'🥣', name:'بليلة (قمح كامل)', desc:'حبوب قمح مع لبن وقرفة', tag:'مشبع'}]
  },
  'الجمعة': {
    breakfast: [{emoji:'🍳', name:'شكشوكة بالخضار', desc:'بيض مع طماطم وفلفل وبصل وثوم', tag:'منوع'}],
    lunch: [{emoji:'🥘', name:'كبدة مشوية', desc:'كبدة بلدي بالليمون والكمون', tag:'قوة'}],
    dinner: [{emoji:'🍯', name:'عسل بماء دافئ', desc:'كوب ماء دافئ مذاب فيه عسل سدر', tag:'تنظيف'}]
  }
};

const DAYS = ['السبت','الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'];

// ===========================
// CORE LOGIC
// ===========================
let selectedDay = 'السبت';

function goTo(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  window.scrollTo(0,0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function initSchedule() {
  const tabs = document.getElementById('weekTabs');
  tabs.innerHTML = DAYS.map(d => `<button class="week-tab ${d===selectedDay?'active':''}" onclick="selectDay('${d}')">${d}</button>`).join('');
  renderSchedule();
}

function selectDay(day) {
  selectedDay = day;
  document.querySelectorAll('.week-tab').forEach(t => t.classList.toggle('active', t.textContent === day));
  renderSchedule();
}

function renderSchedule() {
  const data = SCHEDULE[selectedDay];
  const meals = [{k:'breakfast', l:'الفطور', e:'🌅'}, {k:'lunch', l:'الغداء', e:'☀️'}, {k:'dinner', l:'العشاء', e:'🌙'}];
  document.getElementById('scheduleContent').innerHTML = meals.map(m => `
    <div class="meal-section">
      <div class="meal-header">${m.e} ${m.l}</div>
      ${data[m.k].map(item => `
        <div class="meal-card" onclick="showToast('${item.name}')">
          <div class="meal-img">${item.emoji}</div>
          <div class="meal-info">
            <div class="meal-name">${item.name}</div>
            <div class="meal-desc">${item.desc}</div>
            <span class="meal-tag">${item.tag}</span>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderHerbs(list) {
  document.getElementById('herbsGrid').innerHTML = list.map(h => `
    <div class="herb-card" onclick="openHerb(${h.id})">
      <div class="herb-emoji-bg" style="background:${h.bg}">${h.emoji}</div>
      <div class="herb-body">
        <div class="herb-name">${h.name}</div>
        <div class="herb-benefits">${h.summary}</div>
      </div>
    </div>
  `).join('');
}

function filterHerbs() {
  const q = document.getElementById('herbSearch').value.toLowerCase();
  const filtered = HERBS.filter(h => h.name.includes(q) || h.summary.includes(q));
  renderHerbs(filtered);
}

function openHerb(id) {
  const h = HERBS.find(x => x.id === id);
  document.getElementById('modalHero').style.background = h.bg;
  document.getElementById('modalHero').textContent = h.emoji;
  document.getElementById('modalTitle').textContent = h.name;
  document.getElementById('modalContent').innerHTML = `
    <div class="info-card"><h3>🌿 الفوائد</h3><ul>${h.benefits.map(b=>`<li>${b}</li>`).join('')}</ul></div>
    <div class="info-card"><h3>📋 الاستخدام</h3><ul>${h.usage.map(u=>`<li>${u}</li>`).join('')}</ul></div>
  `;
  document.getElementById('herbModal').classList.add('open');
}

function closeHerbModal() { document.getElementById('herbModal').classList.remove('open'); }

document.addEventListener('DOMContentLoaded', () => {
  initSchedule();
  renderHerbs(HERBS);
});
</script>
</body>
</html>
